<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin &mdash; Knightly</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="brand"><span class="piece">&#9822;</span> Knightly <span class="mono" style="font-size:11px; color:var(--brass); margin-left:6px;">ADMIN</span></a>
  <div class="nav-links" id="adminNav" style="display:none;">
    <button class="btn btn-ghost" id="adminLogoutBtn">Log out of admin</button>
  </div>
</nav>

<!-- Login gate -->
<div class="auth-wrap" id="loginGate">
  <div class="card auth-card">
    <span class="eyebrow">Owner access only</span>
    <h2>Admin login</h2>
    <p class="sub">Enter the admin password to view accounts and games.</p>
    <div class="form-error" id="adminError"></div>
    <form id="adminLoginForm">
      <div class="field">
        <label for="adminPassword">Password</label>
        <input id="adminPassword" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="adminSubmitBtn">Enter admin portal</button>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div class="container admin-shell" id="dashboard" style="display:none;">
  <div class="admin-stats" id="statsRow"></div>

  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="users">Users</button>
    <button class="admin-tab" data-tab="games">Games</button>
  </div>

  <div class="card" id="usersPanel">
    <table class="admin-table">
      <thead>
        <tr><th>ID</th><th>Username</th><th>Email</th><th>Joined</th><th>Status</th><th></th></tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>

  <div class="card" id="gamesPanel" style="display:none;">
    <table class="admin-table">
      <thead>
        <tr><th>Room</th><th>White</th><th>Black</th><th>Status</th><th>Result</th><th>Reason</th><th>Updated</th><th></th></tr>
      </thead>
      <tbody id="gamesBody"></tbody>
    </table>
  </div>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
